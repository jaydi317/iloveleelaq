let selCat="All",selStore="All",selPrice=0,selPriority="All",showSel=false,expanded=null;
const checked=new Set();
const catMap={};CATEGORIES.forEach(c=>catMap[c.n]=c.i);

function init(){
  const cp=document.getElementById("catPills");
  CATEGORIES.forEach(c=>{const b=document.createElement("button");b.className="pill"+(c.n==="All"?" active":"");b.textContent=c.i+" "+(c.n==="All"?"All":c.n.split(" ")[0]);b.onclick=()=>{selCat=c.n;document.querySelectorAll(".pill").forEach(p=>p.classList.remove("active"));b.classList.add("active");render()};cp.appendChild(b)});
  const sf=document.getElementById("storeFilter");
  STORES.forEach(s=>{const o=document.createElement("option");o.value=s;o.textContent=s;sf.appendChild(o)});
  sf.onchange=()=>{selStore=sf.value;render()};
  const pf=document.getElementById("priceFilter");
  PRICES.forEach((p,i)=>{const o=document.createElement("option");o.value=i;o.textContent=p.l;pf.appendChild(o)});
  pf.onchange=()=>{selPrice=+pf.value;render()};
  const prf=document.getElementById("priorityFilter");
  ["All","Must-Have","Nice-to-Have","Splurge"].forEach(p=>{const o=document.createElement("option");o.value=p;o.textContent=p==="All"?"All Priority":p;prf.appendChild(o)});
  prf.onchange=()=>{selPriority=prf.value;render()};
  document.getElementById("searchBox").oninput=()=>render();
  document.getElementById("toggleSel").onclick=function(){showSel=!showSel;this.className="toggle-btn"+(showSel?" active":"");this.textContent=showSel?"★ Selected Only":"☆ Show Selected";render()};
  render();
}

function filter(){
  const q=document.getElementById("searchBox").value.toLowerCase();
  const pr=PRICES[selPrice];
  return I.filter(item=>{
    if(selCat!=="All"&&item.c!==selCat)return false;
    if(selStore!=="All"&&!item.s.includes(selStore))return false;
    if(item.p<pr.a||item.p>pr.b)return false;
    if(selPriority!=="All"&&item.pr!==selPriority)return false;
    if(showSel&&!checked.has(item.id))return false;
    if(q&&!item.n.toLowerCase().includes(q)&&!item.t.toLowerCase().includes(q))return false;
    return true;
  });
}

function updateStats(){
  let v=0;checked.forEach(id=>{const item=I.find(x=>x.id===id);if(item)v+=item.p});
  document.getElementById("selCount").textContent=checked.size;
  document.getElementById("selValue").textContent="$"+v.toLocaleString();
}

function badgeClass(pr){return pr==="Must-Have"?"badge badge-must":pr==="Splurge"?"badge badge-splurge":"badge badge-nice"}

function render(){
  const items=filter();
  const list=document.getElementById("itemList");
  list.innerHTML="";
  document.getElementById("filteredCount").textContent=items.length+" items";
  let curCat=null;
  items.forEach(item=>{
    if(item.c!==curCat){
      curCat=item.c;
      const h=document.createElement("div");h.className="cat-header";
      h.innerHTML=`<span class="icon">${catMap[curCat]||""}</span><div><h2>${curCat}</h2><span class="cnt">${I.filter(x=>x.c===curCat).length} items</span></div>`;
      list.appendChild(h);
    }
    const card=document.createElement("div");
    card.className="card"+(checked.has(item.id)?" checked":"");
    const isExp=expanded===item.id;
    card.innerHTML=`
      <div class="checkbox${checked.has(item.id)?" on":""}" data-id="${item.id}">${checked.has(item.id)?"✓":""}</div>
      <h3>${item.n}</h3>
      <div class="price-row">
        <span class="price">${item.p===0?"Any Amount":"$"+item.p}</span>
        <span class="${badgeClass(item.pr)}">${item.pr}</span>
      </div>
      <p class="note">${item.t}</p>
      <div class="stores">${item.s.map(s=>`<span class="store-tag">${s}</span>`).join("")}</div>
      ${isExp?`<div class="actions">
        <button class="btn-photos" data-q="${encodeURIComponent(item.n)}">📷 See Photos</button>
        <button class="btn-shop" data-q="${encodeURIComponent(item.n)}">🛒 Shop & Compare</button>
      </div>`:""}
    `;
    card.onclick=(e)=>{
      if(e.target.closest(".checkbox")){e.stopPropagation();const id=item.id;checked.has(id)?checked.delete(id):checked.add(id);updateStats();render();return}
      if(e.target.closest(".btn-photos")){e.stopPropagation();window.open("https://www.google.com/search?tbm=isch&q="+e.target.closest(".btn-photos").dataset.q,"_blank");return}
      if(e.target.closest(".btn-shop")){e.stopPropagation();window.open("https://www.google.com/search?tbm=shop&q="+e.target.closest(".btn-shop").dataset.q,"_blank");return}
      expanded=expanded===item.id?null:item.id;render();
    };
    list.appendChild(card);
  });
  if(items.length===0){list.innerHTML=`<div class="empty"><div class="star">✦</div><p>No items match your filters</p></div>`}
  updateStats();
}

document.addEventListener("DOMContentLoaded",init);
</script>
